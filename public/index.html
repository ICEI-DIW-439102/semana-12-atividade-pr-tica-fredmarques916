<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Filmes</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>

    <header class="header">
        <div class="header-inner">
            <h1 class="logo">🎬 CineDB</h1>
            <p class="tagline">Explore o mundo do cinema</p>
        </div>
    </header>

    <main class="main">

        <!-- Controles: busca + filtro de categoria -->
        <section class="controls">
            <div class="search-group">
                <input type="text" id="search" placeholder="Buscar filme..." autocomplete="off" />
                <button id="btnSearch">Buscar</button>
            </div>

            <div class="filter-group">
                <label for="category">Categoria:</label>
                <select id="category">
                    <option value="popular">🔥 Populares</option>
                    <option value="top_rated">⭐ Mais Bem Avaliados</option>
                    <option value="now_playing">🎭 Em Cartaz</option>
                    <option value="upcoming">🚀 Próximos Lançamentos</option>
                </select>
            </div>
        </section>

        <!-- Mensagem de status (carregando / erro / vazio) -->
        <p id="message" class="message"></p>

        <!-- Container dos cards de filmes -->
        <div id="movie-list" class="movie-list"></div>

    </main>

    <footer class="footer">
        <p>Dados fornecidos por <a href="https://www.themoviedb.org" target="_blank">The Movie Database</a></p>
    </footer>

    <script src="assets/scripts/script.js"></script>
</body>

</html>
